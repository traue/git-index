<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style/style.css?v=4.0.0" />
  <script type="text/javascript" src="js/configs.js?v=4.0.0"></script>
  <title>GitIndex — Prof. Thiago G. Traue</title>
</head>

<body data-density="normal">

  <div class="shell">

    <div class="masthead">
      <div class="brand serif">Git<em>Index</em></div>
      <div class="meta">
        <span id="status-chip"><span class="dot"></span>em dia</span>
        <span class="hide-mob" id="semester-chip">Semestre 26.1</span>
        <span class="hide-mob">v<span id="version"></span></span>
        <button class="tweaks-toggle mono" id="tweaks-open" aria-label="Abrir tweaks">Tweaks</button>
      </div>
    </div>

    <div class="subbar">
      <span>Prof. Thiago G. Traue</span>
      <span class="sep">·</span>
      <span>Repositórios de Ensino</span>
      <span class="sep">·</span>
      <span id="subbar-count">—</span>
    </div>

    <div id="app"></div>

    <div class="colophon">
      <span>© <span id="year"></span> · Prof. Thiago G. Traue</span>
      <span>
        <a href="https://github.com/traue/" class="link" target="_blank" rel="noopener noreferrer">GitHub ↗</a>
        &nbsp;·&nbsp;
        <a href="https://api.traue.com.br/disciplinas/" class="link" target="_blank"
          rel="noopener noreferrer">api.traue.com.br ↗</a>
      </span>
    </div>
  </div>

  <div class="tweaks" id="tweaks">
    <header>
      <span>Tweaks</span>
      <button id="tweaks-close" aria-label="Fechar">×</button>
    </header>
    <div class="group">
      <label>Paleta</label>
      <div class="swatches">
        <div class="sw" data-p="paper">Paper</div>
        <div class="sw" data-p="linen">Linen</div>
        <div class="sw" data-p="midnight">Night</div>
      </div>
    </div>
    <div class="group">
      <label>Densidade</label>
      <div class="opts" data-k="density">
        <button data-v="compact">Compacto</button>
        <button data-v="normal" class="on">Normal</button>
        <button data-v="spacious">Espaçoso</button>
      </div>
    </div>
    <div class="group">
      <label>Layout da lista</label>
      <div class="opts" data-k="layout">
        <button data-v="list" class="on">Lista</button>
        <button data-v="grid">Grade</button>
      </div>
    </div>
  </div>

  <script type="text/javascript" src="js/script.js?v=4.0.0"></script>
</body>

</html>
