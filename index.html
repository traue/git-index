<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script type="text/javascript" src="js/configs.js"></script>
  <script type="text/javascript" src="js/constants.js"></script>
  <link rel="stylesheet" href="style/style.css" />
  <title>Disciplinas - Prof. Traue</title>
</head>

<body>
  <div class="backdrop"></div>

  <main class="main">
    <div class="card glass">

      <!-- Loading -->
      <div id="state-loading" class="state active">
        <div class="spinner"></div>
        <p class="state-text">Carregando...</p>
      </div>

      <!-- API error -->
      <div id="state-error" class="state">
        <div class="state-icon">😓</div>
        <h2 class="state-title">Ops...</h2>
        <p class="state-text">Houve um erro ao carregar as disciplinas.<br>Tente novamente em instantes.</p>
        <button class="btn-accent" onclick="window.location.reload()">Tentar novamente</button>
      </div>

      <!-- Inactive -->
      <div id="state-inactive" class="state">
        <div class="state-icon">📚</div>
        <h2 class="state-title">Aguarde</h2>
        <p class="state-text">Aguarde instruções do professor!<br>Esta aplicação ainda não foi ativada.</p>
      </div>

      <!-- Step 1: Shift -->
      <div id="step-shift" class="state">
        <div class="card-header">
          <h1 class="card-title">Disciplinas</h1>
          <p class="card-subtitle">Prof. Thiago Traue</p>
        </div>
        <div class="divider"></div>
        <p class="step-label">Selecione o turno</p>
        <div class="shift-grid">
          <button class="btn-shift" data-shift="diurno">
            <span class="shift-icon">☀️</span>
            <span class="shift-name">Diurno</span>
          </button>
          <button class="btn-shift" data-shift="noturno">
            <span class="shift-icon">🌙</span>
            <span class="shift-name">Noturno</span>
          </button>
          <button class="btn-shift btn-shift--wide" data-shift="ead">
            <span class="shift-icon">🖥️</span>
            <span class="shift-name">EaD</span>
          </button>
        </div>
      </div>

      <!-- Step 2: Disciplines -->
      <div id="step-disciplines" class="state">
        <button id="btn-back" class="btn-back" aria-label="Voltar">← Voltar</button>
        <p class="step-label">Selecione a disciplina</p>
        <div id="discipline-list" class="discipline-list"></div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <span>© <span id="year"></span> Prof. Traue · v.<span id="version"></span> · <a href="https://github.com/traue/git-index" target="_blank" rel="noopener noreferrer">GitHub</a></span>
  </footer>

  <script type="text/javascript" src="js/script.js"></script>
</body>

</html>
